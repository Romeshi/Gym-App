name: fithub_gym
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  font_awesome_flutter: ^10.7.0
  animations: ^2.0.11
  permission_handler: ^12.0.1
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # State Management
  provider: ^6.1.2

  # Maps & Location (Duplicates Removed)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Hardware & ML
  camera: ^0.11.0+2
  google_ml_kit: ^0.19.0
  sensors_plus: ^6.1.1

  # Data & Storage
  intl: ^0.19.0
  path_provider: ^2.1.2
  path: ^1.9.0
  sqflite: ^2.3.3+1

  # Firebase
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2
  firebase_storage: ^12.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
